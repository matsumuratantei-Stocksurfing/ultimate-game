<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極ゲーム 記録・測定</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --dim:#6e7681;
  --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff; --purple:#bc8cff;
  --mono:"SFMono-Regular",Consolas,"Courier New",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;font-size:14px;line-height:1.6}
header{padding:14px 20px 0;border-bottom:1px solid var(--border);background:var(--panel)}
h1{font-size:18px;letter-spacing:.05em}
h1 .ver{font-size:11px;color:var(--dim);font-weight:normal;margin-left:8px}
.sub{font-size:11px;color:var(--muted);margin:2px 0 10px}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:8px 14px;cursor:pointer;font-size:13px;font-family:inherit}
nav button:hover{color:var(--text)}
nav button.active{color:var(--text);border-bottom-color:var(--green)}
main{padding:18px 20px;max-width:1100px;margin:0 auto}
section{display:none}
section.show{display:block}
h2{font-size:15px;margin:18px 0 10px;color:var(--blue)}
h2:first-child{margin-top:0}
h3{font-size:13px;margin:14px 0 8px;color:var(--muted)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.grid6{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.card.pos-card{cursor:pointer;transition:border-color .15s}
.card.pos-card:hover{border-color:var(--blue)}
.card .slot{font-size:11px;color:var(--muted);letter-spacing:.05em}
.card .tick{font-size:16px;font-weight:bold;margin:2px 0}
.card .tick small{font-weight:normal;color:var(--muted);font-size:12px;margin-left:6px}
.card.overdue{border-color:var(--red)}
.card.empty{border-style:dashed;color:var(--dim)}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:150px}
.kpi .l{font-size:11px;color:var(--muted)}
.kpi .v{font-size:22px;font-family:var(--mono);margin-top:2px}
.kpi .n{font-size:11px;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--muted);font-weight:normal;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px}
td{padding:6px 8px;border-bottom:1px solid #21262d;vertical-align:top}
tr:hover td{background:#1a2029}
tr.rowlink{cursor:pointer}
.num{font-family:var(--mono);text-align:right}
th.num{text-align:right}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}.mut{color:var(--muted)}.dim{color:var(--dim)}
.tag{display:inline-block;border:1px solid var(--border);border-radius:4px;padding:0 6px;font-size:11px;color:var(--muted);margin-right:4px}
.tag.g{border-color:var(--green);color:var(--green)}
.tag.r{border-color:var(--red);color:var(--red)}
.tag.a{border-color:var(--amber);color:var(--amber)}
.tag.b{border-color:var(--blue);color:var(--blue)}
.tag.p{border-color:var(--purple);color:var(--purple)}
select{background:#0a0e14;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;padding:6px 8px}
button.btn{background:var(--panel2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 16px;cursor:pointer;font-size:13px;font-family:inherit}
button.btn:hover{border-color:var(--muted)}
button.btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
button.btn.danger{border-color:var(--red);color:var(--red)}
button.btn.small{padding:3px 10px;font-size:12px}
.msg{border-radius:6px;padding:8px 12px;margin:8px 0;font-size:13px}
.msg.err{background:#2d1214;border:1px solid var(--red)}
.msg.warn{background:#2b2211;border:1px solid var(--amber)}
.msg.ok{background:#12261a;border:1px solid var(--green)}
.msg.info{background:#121d2f;border:1px solid #1f6feb}
canvas{background:#0a0e14;border:1px solid var(--border);border-radius:8px;width:100%;height:auto}
.formrow{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin:8px 0}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--muted)}
.gatebar{height:8px;background:#21262d;border-radius:4px;overflow:hidden;margin-top:4px}
.gatebar div{height:100%;background:var(--green)}
.philosophy{font-size:12px;color:var(--dim);border-left:2px solid var(--border);padding-left:10px;margin:10px 0}
.scn{display:inline-block;margin-right:12px;font-family:var(--mono);font-size:12px}
footer{text-align:center;color:var(--dim);font-size:11px;padding:20px}
/* 詳細モーダル */
#modalBack{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10}
#modalBack.show{display:flex;align-items:flex-start;justify-content:center;padding:30px 12px;overflow-y:auto}
#modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;max-width:720px;width:100%;padding:18px 20px;position:relative}
#modalClose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.detail-grid{display:grid;grid-template-columns:110px 1fr;gap:4px 12px;font-size:13px;margin:8px 0}
.detail-grid dt{color:var(--muted);font-size:12px}
.thesis-box{background:#0a0e14;border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;margin:8px 0;white-space:pre-wrap}
.scorebar{display:flex;align-items:center;gap:8px;margin:2px 0;font-size:12px}
.scorebar .lbl{width:110px;color:var(--muted)}
.scorebar .bar{flex:1;height:8px;background:#21262d;border-radius:4px;overflow:hidden}
.scorebar .bar div{height:100%;background:var(--blue)}
.scorebar .val{width:24px;text-align:right;font-family:var(--mono)}
/* 学習機能 (v2.1.0) */
.learn-card{border-left:3px solid var(--purple)}
.learn-card.subdued{opacity:.7}
.learn-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.learn-chip{border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none}
.learn-chip.unread{color:var(--dim);border-style:dashed}
.learn-chip.read{color:var(--text)}
.learn-chip.read:hover{border-color:var(--muted)}
.learn-chip.done{border-color:var(--green);color:var(--green)}
#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f6feb;color:#fff;padding:10px 18px;border-radius:8px;z-index:30;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
</style>
</head>
<body>
<header>
  <h1>究極ゲーム 記録・測定<span class="ver" id="verLabel"></span></h1>
  <div class="sub">これは"脳"ではなく"鏡" — 予測は月曜朝・答え合わせは土曜朝に自動反映されます</div>
  <nav id="tabs">
    <button data-tab="dash" class="active">ダッシュボード</button>
    <button data-tab="rounds">ラウンド一覧</button>
    <button data-tab="measure">測定 (Layer 1)</button>
    <button data-tab="settings">設定</button>
  </nav>
</header>
<main>
  <div id="dataBanner"></div>
  <section id="tab-dash" class="show"></section>
  <section id="tab-rounds"></section>
  <section id="tab-measure"></section>
  <section id="tab-settings"></section>
</main>
<div id="modalBack"><div id="modal"><button id="modalClose">✕</button><div id="modalBody"></div></div></div>
<div id="toast"></div>
<footer>究極ゲーム 記録・測定システム — 単一HTML / data.js自動更新 / 外部依存なし</footer>
<script src="data.js"></script>
<script>
"use strict";
/* ===== 変更履歴（松村式バージョン管理） =====
 v2.2.0 (2026-07-03): 新高値コンテキスト（52週高値/上場来高値との距離・ブレイク有無）の記録・表示・採用試験（バケット別成績）を追加。選定ロジックは不変（記録→測定→採用試験の原則）。
 v2.1.0 (2026-07-03): 投資イロハ学習機能を追加（CURRICULUM_V1 30項目・今回の学びカード・習得トラッカー/習得マップ・Claude深掘り質問コピー）。既存のBrier計算・測定ロジックは無変更。
 v2.0.0 (2026-07-03): 全自動モード（data.js駆動・手入力ゼロ）に刷新。GitHub Pages対応。
 v1.0.0 (2026-07-03): 初版（予測JSON手動取り込み版）。
*/
const APP_VERSION = "2.2.0";
/* ================= 定数 ================= */
const SCHEMA_VERSION = 1;
const OVERRIDE_KEY = "ultimateGame_overrides_v1";
const CRITERIA = [
  {key:"themeMatch",     label:"テーマ合致"},
  {key:"catalystStrength",label:"カタリスト強度"},
  {key:"supplyDemand",   label:"需給"},
  {key:"upside",         label:"上値余地"},
  {key:"downsideControl",label:"下値管理"},
  {key:"moneyFlow",      label:"資金流入"}
];
const EXCLUSIONS = [
  {key:"expectationAhead",label:"期待先行"},
  {key:"shortCover",     label:"踏み上げ/ショートカバー"},
  {key:"athLongTerm",    label:"長期最高値圏"},
  {key:"postIpoProxy",   label:"IPO直後・類似"}
];
const HORIZONS = {week:"週", month:"月", quarter:"季"};
const MARKETS  = {JP:"日本", US:"米国"};
const SCENARIOS = ["bull","base","bear"];
const SCN_LABEL = {bull:"強気", base:"基本", bear:"弱気"};
const LEARNING_TYPES = ["勝ちパターン候補","失敗パターン候補","ノイズ","規律"];
const NAIVE_BRIER = 0.667;
const GATE_MIN_RESOLVED = 20;
const GATE_MIN_REGIMES  = 2;
const ROLLING_WINDOW = 10;
const DISC_NOISE_BAND = 0.5;
const VAR_DEAD_BAND  = 0.35;
/* ================= 投資イロハ カリキュラム（v2.1.0追加） =================
   将来の項目追加は CURRICULUM_V1 配列への追記のみで機能する。文言は固定（松村式スタイル辞書とは別管理）。 */
const CURRICULUM_V1 = [
  // ===== A層: 共通原理（リスク管理・投資心理）=====
  { id: "A01", layer: "common", term: "損小利大", principle: "成績を決めるのは勝率ではなくR倍数（平均利益÷平均損失）。勝率40%でもR=3なら大きく勝てる。" },
  { id: "A02", layer: "common", term: "トレーリングストップ", principle: "天井で売ることは誰にもできない。上昇に合わせて損切りラインを切り上げ、「降り方」で利益を確定する。" },
  { id: "A03", layer: "common", term: "ポジションサイジング", principle: "1回のトレードで失ってよいのは資金の1〜2%まで。複利は生き残った者にしか働かない。" },
  { id: "A04", layer: "common", term: "FOMO（機会損失恐怖）", principle: "「乗り遅れる恐怖」は最も高い場所で買わせる心理装置。急騰後の飛び乗りは統計的に不利。" },
  { id: "A05", layer: "common", term: "プロスペクト理論", principle: "人間は利益を早く確定し、損失を放置する本能を持つ。損切りルールはこの本能への対抗策として存在する。" },
  { id: "A06", layer: "common", term: "期待値思考", principle: "1回の当たり外れで手法を評価しない。同じ判断を100回繰り返した時の損益分布で考える。理由が間違った的中（ラッキーウィン）は実力ではない。" },
  // ===== B層: 週次＝需給・テクニカル =====
  { id: "B01", layer: "weekly", term: "出来高は嘘をつかない", principle: "価格は需給で操作できても出来高の急増は本物の資金流入。出来高を伴わない上昇は信頼度が低い。" },
  { id: "B02", layer: "weekly", term: "支持線・抵抗線", principle: "過去に売買が集中した価格帯は「買った人の後悔」「売った人の後悔」が集まる節目となり、再び攻防が起きる。" },
  { id: "B03", layer: "weekly", term: "移動平均線と押し目", principle: "上昇トレンド中の一時的下落（押し目）は優位なエントリー点。ただしトレンド自体が壊れた下落との区別が核心。" },
  { id: "B04", layer: "weekly", term: "VCP（ボラティリティ収縮）", principle: "値幅と出来高が段階的に細るのは、売り手が枯れて大きな動きが近い前兆（ミネルヴィニ）。" },
  { id: "B05", layer: "weekly", term: "ブレイクアウトとダマシ", principle: "抵抗線を抜けた事実より「出来高を伴って抜けたか」が本物の判定基準。薄商いのブレイクは戻されやすい。" },
  { id: "B06", layer: "weekly", term: "好材料出尽くし", principle: "良いニュースで株価が下がるのは、期待が事前に価格へ織り込まれ、発表が利益確定の合図になったから。" },
  { id: "B07", layer: "weekly", term: "踏み上げ", principle: "空売りの買い戻しは上昇をさらに加速させる。空売り比率が高い銘柄の急騰は需給の歪みが原動力。" },
  { id: "B08", layer: "weekly", term: "地合い", principle: "個別株は市場全体に逆らえない。指数が崩れる日はどんな好業績銘柄も売られる。まず市場、次に銘柄。" },
  { id: "B09", layer: "weekly", term: "窓（ギャップ）", principle: "寄付の急変が作る価格の空白。材料の強さ次第で「埋める窓」と「埋めない窓」に分かれ、埋めない窓は強いトレンドの証拠。" },
  { id: "B10", layer: "weekly", term: "信用残", principle: "高水準の信用買い残は「いずれ売らなければならない人の在庫」＝将来の売り圧力であり、上値を重くする。" },
  // ===== C層: 月次＝決算・セクター =====
  { id: "C01", layer: "monthly", term: "決算は実績よりガイダンス", principle: "株価を動かすのは過去の数字ではなく将来見通しの修正。好実績でもガイダンス弱気なら売られる。" },
  { id: "C02", layer: "monthly", term: "決算またぎ", principle: "決算持ち越しは運試しではなく期待値計算。想定上振れ幅と下振れ幅を比べ、リスクリワードが不利なら降りる。" },
  { id: "C03", layer: "monthly", term: "セクターローテーション", principle: "資金は市場から消えるのではなく業種間を循環する。下がったセクターの資金がどこへ向かったかを追う。" },
  { id: "C04", layer: "monthly", term: "テーマ物色の寿命", principle: "テーマ相場は初動（本命が動く）→過熱（出遅れ・関連が動く）→崩壊の3段階。今どの段階かで戦略が変わる。" },
  { id: "C05", layer: "monthly", term: "業績改善初期", principle: "株価を最も動かすのは利益の絶対額ではなく変化率。赤字縮小・黒字転換の「初期」が最大の値幅を生む（CANSLIM）。" },
  { id: "C06", layer: "monthly", term: "機関投資家の足跡", principle: "大口は一度に買えないため数週間かけて買い集める。出来高増加が続きながら株価が下がらないのはそのサイン。" },
  { id: "C07", layer: "monthly", term: "株主還元イベント", principle: "増配・自社株買いは需給改善と「経営陣が割安と考えている」メッセージの両面で株価に効く。" },
  { id: "C08", layer: "monthly", term: "浮動株と値動きの軽さ", principle: "小型株が急騰しやすいのは市場で動かせる株数が少ないから。同じ資金でも浮動株が少ないほど値幅が出る。諸刃の剣。" },
  // ===== D層: 四半期＝マクロ・国策 =====
  { id: "D01", layer: "quarterly", term: "金利とグロース株", principle: "金利上昇は将来利益の割引率を上げ、成長株の評価を圧縮する。グロース株にとって金利は重力。" },
  { id: "D02", layer: "quarterly", term: "為替と業種", principle: "円安は輸出・インバウンド・海外資産保有企業に追い風、円高は輸入・内需に追い風。業種ごとの感応度を知る。" },
  { id: "D03", layer: "quarterly", term: "国策に売りなし", principle: "政策テーマ（骨太方針・予算・法改正）は予算という実弾を伴うため資金流入が長期化しやすい。" },
  { id: "D04", layer: "quarterly", term: "景気サイクルとセクター", principle: "景気回復初期はハイテク・素材・金融、後期はディフェンシブ（食品・医薬・電力）が相対的に強い。" },
  { id: "D05", layer: "quarterly", term: "需給カレンダー", principle: "SQ、指数リバランス、年末の税金対策売り、月末のドレッシング買いなど、業績と無関係に株価が動く定例イベントがある。" },
  { id: "D06", layer: "quarterly", term: "リスクオフの伝播", principle: "VIX急騰時は全資産の相関が1に近づき分散が効かなくなる。危機時は「何を持つか」より「どれだけ持つか」。" }
];
const CURRICULUM_LAYER_LABEL = {common:"A層: 共通原理", weekly:"B層: 週次・需給/テクニカル", monthly:"C層: 月次・決算/セクター", quarterly:"D層: 季次・マクロ/国策"};
const HORIZON_TO_LAYER = {week:"weekly", month:"monthly", quarter:"quarterly"};
const CURRICULUM_PROGRESS_KEY = "curriculumProgress";   // {id:{count,firstShown,understood}}
const CURRICULUM_ASSIGN_KEY = "curriculumAssignments";  // {positionId: curriculumId} 答え合わせ1件につき1項目を固定
const WEAK_LAYER_BRIER = 0.75;  // 直近10件で層平均Brierがこれ以上（=0.667を明確に下回る成績）なら弱点層として優先
const WEAK_LAYER_MIN_N = 3;
/* ================= データ読み込み（data.js 駆動） ================= */
let state = {schemaVersion:SCHEMA_VERSION, rounds:[], positions:[], retiredCriteria:{}, updatedAt:null};
let dataProblems = [];
(function loadData(){
  const g = window.GAME_DATA;
  if(!g){ dataProblems.push("data.js が読み込めません。アプリと同じフォルダに data.js があるか確認してください。"); return; }
  if(g.schemaVersion !== SCHEMA_VERSION) dataProblems.push("schemaVersion不一致（データ:"+g.schemaVersion+" / アプリ:"+SCHEMA_VERSION+"）。表示は継続しますが要確認。");
  state.rounds = Array.isArray(g.rounds)? g.rounds : [];
  state.positions = Array.isArray(g.positions)? g.positions : [];
  state.updatedAt = g.updatedAt || null;
  // 整合性チェック（Garbage in → garbage learned の防波堤）
  state.positions.forEach(p=>{
    const tag = p.id||p.ticker||"?";
    if(p.direction!=="キャッシュ"){
      if(p.entry && !p.entry.date) dataProblems.push(tag+": entry.date 欠損（ルール1違反）");
      if(p.scenarios){
        const s = SCENARIOS.reduce((a,k)=>a+(p.scenarios[k]?p.scenarios[k].prob:0),0);
        if(Math.abs(s-1)>0.001) dataProblems.push(tag+": シナリオ確率合計 "+s.toFixed(3)+" ≠ 1.0");
      }
      if(p.resolution && p.resolution.resultPrice && !p.resolution.resultPrice.date)
        dataProblems.push(tag+": 結果価格に日付なし（ルール1違反）");
    }
    if(!state.rounds.some(r=>r.roundId===p.roundId)) dataProblems.push(tag+": 親ラウンド "+p.roundId+" が見つかりません");
  });
  // ローカル上書き（基準の削除確定は端末側に保持）
  try{
    const ov = JSON.parse(localStorage.getItem(OVERRIDE_KEY)||"{}");
    state.retiredCriteria = ov.retiredCriteria||{};
  }catch(e){ state.retiredCriteria = {}; }
})();
function saveOverrides(){
  localStorage.setItem(OVERRIDE_KEY, JSON.stringify({retiredCriteria:state.retiredCriteria}));
}
/* ================= ユーティリティ ================= */
const $ = s=>document.querySelector(s);
function esc(x){ return String(x==null?"":x).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function mean(a){ return a.length? a.reduce((x,y)=>x+y,0)/a.length : NaN; }
function variance(a){ if(a.length<2)return NaN; const m=mean(a); return a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1); }
function ppText(pp){
  if(!pp) return "—";

/* ================= 測定ロジック (Layer 1) ================= */
function computeBrier(pos){
  if(!pos.resolution || pos.direction==="キャッシュ" || !pos.scenarios) return null;
  const hit = pos.resolution.whichScenarioHit;
  let bs = 0;
  SCENARIOS.forEach(s=>{
    const p = pos.scenarios[s].prob;
    const o = (hit===s)? 1 : 0;
    bs += (p-o)*(p-o);
  });
  return bs;
}
function isLuckyWin(pos){
  const r = pos.resolution;
  return r && (r.judgment==="◎"||r.judgment==="○") && r.thesisValidated!=="正しい";
}
function resolvedPositions(filter){
  filter = filter||{};
  return state.positions
    .filter(p=>p.resolution && p.direction!=="キャッシュ" && !p.resolution.isCash)
    .filter(p=>!filter.horizon || p.horizon===filter.horizon)
    .filter(p=>!filter.market || p.market===filter.market)
    .filter(p=>!filter.regime || regimeKeyOf(p)===filter.regime)
    .sort((a,b)=> (a.resolution.resolvedAt||"").localeCompare(b.resolution.resolvedAt||""));
}
function rollingBrierSeries(list, win){
  win = win||ROLLING_WINDOW;
  const pts=[];
  const bss = list.map(computeBrier).filter(v=>v!=null);
  for(let i=0;i<bss.length;i++){
    const s = bss.slice(Math.max(0,i-win+1), i+1);
    pts.push({i:i+1, raw:bss[i], roll: mean(s)});
  }
  return pts;
}
function gateStatus(list){
  const n = list.length, m = new Set(list.map(regimeKeyOf)).size;
  return {n, m, pass: n>=GATE_MIN_RESOLVED && m>=GATE_MIN_REGIMES,
    label: "解決済み "+n+"/"+GATE_MIN_RESOLVED+"件・レジーム "+m+"/"+GATE_MIN_REGIMES};
}
function discriminationStats(){
  const resolved = resolvedPositions();
  const gate = gateStatus(resolved);
  const winners = resolved.filter(p=>{
    const r=p.resolution;
    return (r.judgment==="◎"||r.judgment==="○") && r.thesisValidated==="正しい";
  });
  const luckyWins = resolved.filter(isLuckyWin);
  const losers = resolved.filter(p=>["△","✗"].includes(p.resolution.judgment));
  const rows = CRITERIA.map(c=>{
    const w = winners.map(p=>p.scores?.[c.key]).filter(v=>typeof v==="number");
    const l = losers.map(p=>p.scores?.[c.key]).filter(v=>typeof v==="number");
    const all = resolved.map(p=>p.scores?.[c.key]).filter(v=>typeof v==="number");
    const wm = mean(w), lm = mean(l);
    const disc = (isNaN(wm)||isNaN(lm))? NaN : wm-lm;
    const vr = variance(all);
    let verdict = null;
    if(gate.pass){
      if(!isNaN(vr) && vr<VAR_DEAD_BAND) verdict = {type:"novar", text:"分散≈0：情報なし（削る候補・提案）"};
      else if(!isNaN(disc) && Math.abs(disc)<DISC_NOISE_BAND) verdict = {type:"nodisc", text:"効いていない（削る候補・提案）"};
      else if(!isNaN(disc)) verdict = {type:"works", text:"区別している（disc="+disc.toFixed(2)+"）"};
      else verdict = {type:"na", text:"勝者/敗者サンプル不足"};
    }
    return {key:c.key, label:c.label, winMean:wm, loseMean:lm, disc, varAll:vr, verdict,
      retired: !!state.retiredCriteria[c.key]};
  });
  return {gate, winners, losers, luckyWins, rows, resolved};
}
function disciplineStats(){
  const resolved = state.positions.filter(p=>p.resolution && !p.resolution.isCash);
  const slCases = resolved.filter(p=>p.resolution.stopLossDiscipline && p.resolution.stopLossDiscipline!=="該当なし");
  const slExec = slCases.filter(p=>p.resolution.stopLossDiscipline==="執行").length;
  const nonCash = state.positions.filter(p=>p.direction!=="キャッシュ" && p.exclusionCheck);
  const exclViolations = nonCash.filter(p=>EXCLUSIONS.some(x=>p.exclusionCheck[x.key]===true));
  return {
    slTotal: slCases.length, slExec,
    slRate: slCases.length? slExec/slCases.length : NaN,
    exclTotal: nonCash.length, exclViol: exclViolations.length,
    exclRate: nonCash.length? (nonCash.length-exclViolations.length)/nonCash.length : NaN
  };
}
function returnPct(pos){
  if(!pos.resolution || !pos.entry || !pos.resolution.resultPrice) return null;
  const raw = (pos.resolution.resultPrice.value/pos.entry.value - 1)*100;
  return pos.direction==="ショート"? -raw : raw;
}
/* ================= 新高値コンテキスト（v2.2.0・採用試験） =================
   「有益そうな要因」は選定に直接足さず、まず全ポジションに記録して勝敗との関係を測定する。
   バケット別の成績が十分なサンプルで確認できた場合のみ、人間の判断（チャットでの相談）で選定基準へ昇格させる。 */
function newHighBucket(p){
  const nh = p.newHighContext;
  if(!nh) return null;
  if(nh.breakout===true) return "新高値ブレイク直後";
  if(typeof nh.dist52wPct==="number" && nh.dist52wPct>=-5) return "高値圏（ブレイクなし）";
  if(typeof nh.dist52wPct==="number") return "高値圏外";
  return "情報不足";
}
const NEWHIGH_BUCKETS = ["新高値ブレイク直後","高値圏（ブレイクなし）","高値圏外","情報不足"];
const NEWHIGH_MIN_N = 10; // バケット別判定の最低サンプル門
/* ================= 投資イロハ学習機能 (v2.1.0) =================
   外部API不使用・ルールベース。既存の測定ロジックには一切影響しない。 */
function loadJsonKey(key){ try{ return JSON.parse(localStorage.getItem(key)||"{}"); }catch(e){ return {}; } }
function saveJsonKey(key,obj){ localStorage.setItem(key, JSON.stringify(obj)); }
function curriculumById(id){ return CURRICULUM_V1.find(c=>c.id===id)||null; }
function curriculumShownCount(prog,id){ return (prog[id]&&prog[id].count)||0; }
function isMissJudgment(pos){ return !!pos.resolution && ["△","✗"].includes(pos.resolution.judgment); }
// 弱点連動: 直近10件の解決から層別平均Brierを集計し、明確に悪い層を返す（該当なしはnull）
function weakestCurriculumLayer(){
  const recent = resolvedPositions().slice(-10);
  const by = {};
  recent.forEach(p=>{
    const l = HORIZON_TO_LAYER[p.horizon];
    const bs = computeBrier(p);
    if(bs==null || !l) return;
    (by[l]=by[l]||[]).push(bs);
  });
  let worst=null, worstMean=-1;
  Object.keys(by).forEach(l=>{
    if(by[l].length>=WEAK_LAYER_MIN_N){
      const m = mean(by[l]);
      if(m>=WEAK_LAYER_BRIER && m>worstMean){ worst=l; worstMean=m; }
    }
  });
  return worst;
}
// 選択ロジック（優先順位: ①ラッキーウィン→A06固定 ②弱点層上書き ③外れ→層対応 ④的中→全体から。②③④は表示回数最少→同数ランダム）
function selectCurriculumId(pos){
  if(isLuckyWin(pos)) return "A06";
  const prog = loadJsonKey(CURRICULUM_PROGRESS_KEY);
  let pool;
  const weak = weakestCurriculumLayer();
  if(weak) pool = CURRICULUM_V1.filter(c=>c.layer===weak);
  else if(isMissJudgment(pos)) pool = CURRICULUM_V1.filter(c=>c.layer===HORIZON_TO_LAYER[pos.horizon]);
  else pool = CURRICULUM_V1.slice();
  if(!pool.length) pool = CURRICULUM_V1.slice();
  const minCount = Math.min(...pool.map(c=>curriculumShownCount(prog,c.id)));
  const cand = pool.filter(c=>curriculumShownCount(prog,c.id)===minCount);
  return cand[Math.floor(Math.random()*cand.length)].id;
}
// 答え合わせ1件につき1項目を固定割当（再表示で再抽選しない）。初回割当時に表示回数を記録。
function assignCurriculum(pos){
  if(!pos || !pos.resolution || pos.resolution.isCash || pos.direction==="キャッシュ") return null;
  const asg = loadJsonKey(CURRICULUM_ASSIGN_KEY);
  if(asg[pos.id]) return curriculumById(asg[pos.id]);
  const id = selectCurriculumId(pos);
  if(!id) return null;
  asg[pos.id] = id;
  saveJsonKey(CURRICULUM_ASSIGN_KEY, asg);
  const prog = loadJsonKey(CURRICULUM_PROGRESS_KEY);
  const rec = prog[id]||{count:0, firstShown:null, understood:false};
  rec.count++;
  if(!rec.firstShown) rec.firstShown = new Date().toISOString();
  prog[id] = rec;
  saveJsonKey(CURRICULUM_PROGRESS_KEY, prog);
  return curriculumById(id);
}
function curriculumReadCount(){
  const prog = loadJsonKey(CURRICULUM_PROGRESS_KEY);
  return CURRICULUM_V1.filter(c=>curriculumShownCount(prog,c.id)>0).length;
}

/* ================= canvasグラフ ================= */
function drawBrierChart(canvas, pts){
  const dpr = window.devicePixelRatio||1;
  const W = canvas.clientWidth||800, H = 260;
  canvas.width = W*dpr; canvas.height = H*dpr; canvas.style.height = H+"px";
  const ctx = canvas.getContext && canvas.getContext("2d");
  if(!ctx) return;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const padL=44, padR=12, padT=14, padB=26;
  const yMax = 2.0, yMin = 0;
  const x = i => padL + (W-padL-padR) * (pts.length<=1? 0.5 : (i)/(pts.length-1));
  const y = v => padT + (H-padT-padB) * (1 - (v-yMin)/(yMax-yMin));
  ctx.font = "10px monospace"; ctx.fillStyle="#6e7681"; ctx.strokeStyle="#21262d"; ctx.lineWidth=1;
  [0,0.5,1.0,1.5,2.0].forEach(v=>{
    ctx.beginPath(); ctx.moveTo(padL,y(v)); ctx.lineTo(W-padR,y(v)); ctx.stroke();
    ctx.fillText(v.toFixed(1), 8, y(v)+3);
  });
  ctx.strokeStyle="#f85149"; ctx.setLineDash([5,4]); ctx.beginPath();
  ctx.moveTo(padL,y(NAIVE_BRIER)); ctx.lineTo(W-padR,y(NAIVE_BRIER)); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="#f85149"; ctx.fillText("0.667 無知ライン", W-padR-110, y(NAIVE_BRIER)-5);
  if(!pts.length){
    ctx.fillStyle="#6e7681"; ctx.font="12px sans-serif";
    ctx.fillText("解決済みポジションがまだありません", padL+20, H/2);
    return;
  }
  ctx.fillStyle="#8b949e";
  pts.forEach((p,i)=>{ ctx.beginPath(); ctx.arc(x(i),y(p.raw),2.2,0,7); ctx.fill(); });
  ctx.strokeStyle="#3fb950"; ctx.lineWidth=2; ctx.beginPath();
  pts.forEach((p,i)=>{ i? ctx.lineTo(x(i),y(p.roll)) : ctx.moveTo(x(i),y(p.roll)); });
  ctx.stroke();
  const last = pts[pts.length-1];
  ctx.fillStyle="#3fb950"; ctx.font="11px monospace";
  ctx.fillText("ローリング("+ROLLING_WINDOW+") = "+last.roll.toFixed(3), padL+6, padT+10);
  ctx.fillStyle="#6e7681"; ctx.font="10px monospace";
  ctx.fillText("解決順 →", W-padR-60, H-8);
}

      html += "<td>"+esc(p.resolution.thesisValidated||"—")+"</td>";
      html += "<td class='num'>"+(bs!=null?bs.toFixed(3):"—")+"</td></tr>";
    });
    html += "</table></div>";
    html += curriculumCardHtml(recent[0]); // 最新の答え合わせ1件につき学びカード1枚（視覚的主役はBrier、カードは脇役）
  }
  html += "<div class='philosophy'>健全に運用できていれば、毎週の学びの大半が「ノイズ」判定になるのが正しい。毎回新しい勝ちパターンが出るのは過学習のサイン。</div>";
  el.innerHTML = html;
  bindDetailLinks(el);
  bindCurriculumButtons(el);
}

function showDetail(id){

  let html = "<h2 style='margin-top:0'>"+esc(p.ticker)+" <span class='mut' style='font-size:13px'>"+esc(p.name||"")+"</span></h2>";
  html += "<div>"+["<span class='tag b'>"+posLabel(p)+"</span>",
    "<span class='tag "+(p.direction==="ロング"?"g":p.direction==="ショート"?"r":"b")+"'>"+esc(p.direction)+"</span>",
    "<span class='tag'>ラウンド "+esc(p.roundId)+"</span>",

  if(p.direction!=="キャッシュ"){
    html += "<h3>予測</h3><dl class='detail-grid'>";

    if(p.scenarios){
      SCENARIOS.forEach(s=>{
        const sc = p.scenarios[s];
        const chg = p.entry? ((sc.price/p.entry.value-1)*100) : null;
        html += "<dt>"+SCN_LABEL[s]+"シナリオ</dt><dd><span class='num'>"+Math.round(sc.prob*100)+"%</span> → 目標 <b>"+fmtNum(sc.price)+"</b>"+(chg!=null? " <span class='"+pctClass(chg)+"'>("+fmtPct(chg)+")</span>":"")+"</dd>";
      });
    }
    html += "<dt>損切りライン</dt><dd>"+(p.stopLoss? fmtNum(p.stopLoss):"—")+"</dd>";
    if(p.newHighContext){
      const nh = p.newHighContext;
      let nhTxt = (typeof nh.dist52wPct==="number"? "52週高値比 "+fmtPct(nh.dist52wPct) : "52週高値比 —");
      if(typeof nh.distAthPct==="number") nhTxt += "　上場来高値比 "+fmtPct(nh.distAthPct);
      nhTxt += nh.breakout===true? " <span class='tag g'>新高値ブレイク直後</span>" : nh.breakout===false? " <span class='tag'>ブレイクなし</span>" : " <span class='dim'>ブレイク情報なし</span>";

      html += "<dt>新高値コンテキスト</dt><dd>"+nhTxt+"</dd>";
    }
    html += "</dl>";
    html += "<h3>選定理由（論拠）</h3><div class='thesis-box'>"+esc(p.thesis||"—")+"</div>";
    if(p.scores){
      html += "<h3>6基準スコア</h3>";
      CRITERIA.forEach(c=>{
        const v = p.scores[c.key];
        html += "<div class='scorebar'><span class='lbl'>"+c.label+"</span><div class='bar'><div style='width:"+(v*10)+"%'></div></div><span class='val'>"+v+"</span></div>";
      });
    }
    if(p.exclusionCheck){
      const hits = EXCLUSIONS.filter(x=>p.exclusionCheck[x.key]);
      html += "<h3>除外チェック</h3><div>"+(hits.length? hits.map(x=>"<span class='tag r'>"+x.label+"=該当</span>").join("")+" <span class='warn' style='font-size:12px'>該当のまま選定（規律違反として記録）</span>" : "<span class='tag g'>4項目すべてクリア</span>")+"</div>";
    }
  } else {
    html += "<h3>キャッシュ判断の理由</h3><div class='thesis-box'>"+esc(p.thesis||"—")+"</div>";
    html += "<dl class='detail-grid'><dt>判定日</dt><dd>"+esc(p.targetDate||"—")+"</dd></dl>";
  }
  if(p.resolution && !p.resolution.isCash){
    const rr = p.resolution, rp = returnPct(p), bs = computeBrier(p);
    html += "<h3>答え合わせ結果</h3><dl class='detail-grid'>";
    html += "<dt>結果価格</dt><dd>"+ppText(rr.resultPrice)+"</dd>";
    html += "<dt>騰落</dt><dd class='"+(rp!=null?pctClass(rp):"")+"'>"+(rp!=null?fmtPct(rp):"—")+(p.direction==="ショート"?"（ショート実効）":"")+"</dd>";
    html += "<dt>シナリオ判定</dt><dd>"+esc(rr.whichScenarioHit==="想定外"?"想定外":(SCN_LABEL[rr.whichScenarioHit]||"—"))+"　Brier "+(bs!=null?bs.toFixed(3):"—")+"</dd>";
    html += "<dt>judgment</dt><dd>"+esc(rr.judgment||"—")+(isLuckyWin(p)?" <span class='tag a'>ラッキー勝ち（勝者統計から除外）</span>":"")+"</dd>";
    html += "<dt>論拠検証</dt><dd>"+esc(rr.thesisValidated||"—")+"</dd>";
    html += "<dt>損切り規律</dt><dd>"+esc(rr.stopLossDiscipline||"—")+"</dd>";
    html += "<dt>学び</dt><dd>"+(rr.learning? "<span class='tag p'>"+esc(rr.learning.type)+"</span> "+esc(rr.learning.note||""):"—")+"</dd>";
    if(rr.corporateAction && rr.corporateAction!=="なし") html += "<dt>権利落ち</dt><dd class='warn'>"+esc(rr.corporateAction)+"</dd>";
    html += "</dl>";
    if(rr.resultPrice && rr.resultPrice.isEstimate) html += "<div class='msg warn' style='font-size:12px'>結果価格は自動取得の推定値です。実際の終値と違う場合はCoworkチャットで「本当は◯◯円」と一言伝えれば訂正されます。</div>";
    html += curriculumCardHtml(p);
  } else if(p.resolution && p.resolution.isCash){
    html += "<h3>キャッシュ判断の振り返り</h3><div class='thesis-box'>"+esc(p.resolution.note||"—")+"</div>";
  }
  $("#modalBody").innerHTML = html;
  $("#modalBack").classList.add("show");
  bindCurriculumButtons($("#modalBody"));
}

  if(!state.rounds.length){ el.innerHTML = html+"<div class='panel mut'>まだありません。初回の予測は次の月曜朝に自動反映されます。</div>"; return; }

    ps.forEach(p=>{

      const rp = returnPct(p);
      const bs = computeBrier(p);
      html += "<tr class='rowlink' data-pos='"+esc(p.id)+"'><td>"+posLabel(p)+"</td><td>"+esc(p.direction)+"</td><td><b>"+esc(p.ticker)+"</b></td>";
      html += "<td class='num'>"+(p.entry?fmtNum(p.entry.value):"—")+"</td>";
      html += "<td class='num'>"+(r2&&r2.resultPrice? fmtNum(r2.resultPrice.value)+(r2.resultPrice.isEstimate?"<span class='warn'>*</span>":""):"—")+"</td>";
      html += "<td class='num "+(rp!=null?pctClass(rp):"")+"'>"+(rp!=null?fmtPct(rp):"—")+"</td>";
      html += "<td class='num'>"+(bs!=null? bs.toFixed(3):"—")+"</td>";
      html += "<td>"+(r2? esc(r2.judgment||(r2.isCash?"記録":"—"))+(isLuckyWin(p)?" <span class='tag a'>ラッキー</span>":""):"<span class='dim'>未解決</span>")+"</td>";
      html += "<td>"+(r2? esc(r2.thesisValidated||"—"):"—")+"</td>";
      html += "<td>"+(r2&&r2.learning? "<span class='tag "+(r2.learning.type==="ノイズ"?"":"p")+"'>"+esc(r2.learning.type)+"</span>":"—")+"</td></tr>";

  bindDetailLinks(el);

/* ================= 測定タブ ================= */
let measureFilter = {horizon:"", market:"", regime:""};
function renderMeasure(){
  const el = $("#tab-measure");
  const all = resolvedPositions();
  const regimes = [...new Set(all.map(regimeKeyOf))];
  let html = "<h2>キャリブレーション（Brier）</h2>";
  html += "<div class='panel'><div class='formrow'>";
  html += "<div class='field'><label>時間軸</label><select id='fH'><option value=''>全て</option>"+Object.keys(HORIZONS).map(h=>"<option value='"+h+"'"+(measureFilter.horizon===h?" selected":"")+">"+HORIZONS[h]+"</option>").join("")+"</select></div>";
  html += "<div class='field'><label>市場</label><select id='fM'><option value=''>全て</option>"+Object.keys(MARKETS).map(m=>"<option value='"+m+"'"+(measureFilter.market===m?" selected":"")+">"+MARKETS[m]+"</option>").join("")+"</select></div>";
  html += "<div class='field'><label>レジーム</label><select id='fR'><option value=''>全て</option>"+regimes.map(r=>"<option"+(measureFilter.regime===r?" selected":"")+">"+esc(r)+"</option>").join("")+"</select></div>";
  html += "</div>";
  const filtered = resolvedPositions({horizon:measureFilter.horizon||null, market:measureFilter.market||null, regime:measureFilter.regime||null});
  const pts = rollingBrierSeries(filtered);
  html += "<canvas id='brierChart'></canvas>";
  const meanBs = mean(filtered.map(computeBrier).filter(v=>v!=null));
  html += "<div class='mut' style='font-size:12px;margin-top:6px'>対象 "+filtered.length+"件　平均Brier "+(isNaN(meanBs)?"—":meanBs.toFixed(3))+"　｜　0.667＝一様(1/3,1/3,1/3)の無知ライン。ローリングが継続的に下回って初めてエッジと言える。単発の低さはノイズ。</div>";
  html += "</div>";
  const ds = discriminationStats();
  html += "<h2>基準別の効き測定（discrimination）</h2>";
  if(!ds.gate.pass){
    html += "<div class='msg info'><b>データ不足：判定は出せません</b>（"+ds.gate.label+"）<br>最低サンプル門: 解決済み"+GATE_MIN_RESOLVED+"件以上 かつ 2レジーム以上。それまでは参考値のみ表示し、削除提案は行いません。";
    html += "<div class='gatebar'><div style='width:"+Math.min(100, Math.round(ds.gate.n/GATE_MIN_RESOLVED*100))+"%'></div></div></div>";
  }
  html += "<div class='panel'>";
  html += "<div class='mut' style='font-size:12px;margin-bottom:6px'>勝者＝◎/○かつ論拠「正しい」（"+ds.winners.length+"件）　敗者＝△/✗（"+ds.losers.length+"件）　ラッキー勝ち除外（"+ds.luckyWins.length+"件）</div>";
  html += "<table><tr><th>基準</th><th class='num'>勝者平均</th><th class='num'>敗者平均</th><th class='num'>差(disc)</th><th class='num'>全体分散</th><th>判定</th><th>操作</th></tr>";
  ds.rows.forEach(r=>{
    html += "<tr"+(r.retired?" style='opacity:.45'":"")+"><td>"+r.label+(r.retired?" <span class='tag r'>削除済み</span>":"")+"</td>";
    html += "<td class='num'>"+(isNaN(r.winMean)?"—":r.winMean.toFixed(2))+"</td>";
    html += "<td class='num'>"+(isNaN(r.loseMean)?"—":r.loseMean.toFixed(2))+"</td>";
    html += "<td class='num "+(isNaN(r.disc)?"":(Math.abs(r.disc)<DISC_NOISE_BAND?"warn":"pos"))+"'>"+(isNaN(r.disc)?"—":(r.disc>=0?"+":"")+r.disc.toFixed(2))+"</td>";
    html += "<td class='num'>"+(isNaN(r.varAll)?"—":r.varAll.toFixed(2))+"</td>";
    if(!ds.gate.pass) html += "<td class='dim'>—（データ不足）</td><td></td>";
    else{
      html += "<td class='"+(r.verdict.type==="works"?"pos":"warn")+"'>"+esc(r.verdict.text)+"</td>";
      if(r.retired) html += "<td><button class='btn small' data-revive='"+r.key+"'>復帰</button></td>";
      else if(r.verdict.type==="nodisc"||r.verdict.type==="novar") html += "<td><button class='btn small danger' data-retire='"+r.key+"'>削除を確定（人間の操作）</button></td>";
      else html += "<td></td>";
    }
    html += "</tr>";
  });
  html += "</table>";
  html += "<div class='philosophy'>「効いていない」は提案のみ。実際の削除はここでの人間の確定操作でのみ行われる（自動削除禁止）。削除を確定したら、Coworkチャットにも「基準◯◯を削除確定した」と一言伝えてください（自動予測タスクに反映されます）。</div>";
  html += "</div>";
  // 新高値コンテキスト別成績（採用試験・v2.2.0）
  const nhAll = resolvedPositions().filter(p=>p.newHighContext);
  html += "<h2>新高値コンテキスト別成績（採用試験）</h2><div class='panel'>";
  if(!nhAll.length){
    html += "<div class='mut' style='font-size:12px'>まだ記録がありません。次回の予測から各銘柄に52週高値との距離・新高値ブレイクの有無が自動記録され、ここで「新高値視点が本当に勝敗を区別するか」を測定します。判定は各バケット"+NEWHIGH_MIN_N+"件以上で表示されます。</div>";
  } else {
    html += "<table><tr><th>バケット</th><th class='num'>件数</th><th class='num'>勝率(◎○)</th><th class='num'>平均リターン</th><th class='num'>平均Brier</th><th>判定</th></tr>";
    NEWHIGH_BUCKETS.forEach(b=>{
      const g = nhAll.filter(p=>newHighBucket(p)===b);
      if(!g.length) return;
      const wins = g.filter(p=>["◎","○"].includes(p.resolution.judgment)).length;
      const rets = g.map(returnPct).filter(v=>v!=null);
      const bss = g.map(computeBrier).filter(v=>v!=null);
      const mr = mean(rets);
      html += "<tr><td>"+esc(b)+"</td><td class='num'>"+g.length+"</td>";
      html += "<td class='num'>"+Math.round(wins/g.length*100)+"%</td>";
      html += "<td class='num "+(isNaN(mr)?"":(mr>0?"pos":"neg"))+"'>"+(rets.length?fmtPct(mr):"—")+"</td>";
      html += "<td class='num'>"+(bss.length?mean(bss).toFixed(3):"—")+"</td>";
      html += "<td class='"+(g.length>=NEWHIGH_MIN_N?"":"dim")+"'>"+(g.length>=NEWHIGH_MIN_N? "判定可（バケット間の差を比較）":"—（データ不足 "+g.length+"/"+NEWHIGH_MIN_N+"）")+"</td></tr>";
    });
    html += "</table><div class='philosophy'>採用試験: バケット間で勝率・平均リターン・Brierに明確な差が出た場合のみ、人間の確定操作（チャットでの相談）を経て選定基準へ昇格させる。それまで選定ロジックは変えない（単一変数の原則）。</div>";
  }
  html += "</div>";
  const disc = disciplineStats();
  html += "<h2>規律スコア（予測精度とは分離して測定）</h2><div class='kpis'>";
  html += kpi("損切り執行率", isNaN(disc.slRate)?"—":Math.round(disc.slRate*100)+"%", "該当"+disc.slTotal+"件中 執行"+disc.slExec+"件", isNaN(disc.slRate)?"":(disc.slRate>=0.99?"pos":"warn"));
  html += kpi("除外ルール遵守率", isNaN(disc.exclRate)?"—":Math.round(disc.exclRate*100)+"%", "全"+disc.exclTotal+"件中 違反"+disc.exclViol+"件", isNaN(disc.exclRate)?"":(disc.exclRate>=0.99?"pos":"warn"));
  html += "</div>";
  const learns = state.positions.filter(p=>p.resolution&&p.resolution.learning).map(p=>p.resolution.learning.type);
  if(learns.length){
    const cnt = {}; LEARNING_TYPES.forEach(t=>cnt[t]=0); learns.forEach(t=>{ if(cnt[t]!=null)cnt[t]++; });
    const noiseRatio = cnt["ノイズ"]/learns.length;
    html += "<h2>学びタイプ分布（過学習の体温計）</h2><div class='panel'>";
    html += LEARNING_TYPES.map(t=>"<span class='tag "+(t==="ノイズ"?"g":"")+"' style='margin-right:8px'>"+t+" "+cnt[t]+"件</span>").join("");
    html += "<div class='mut' style='font-size:12px;margin-top:8px'>ノイズ比率 "+Math.round(noiseRatio*100)+"%　"+(noiseRatio<0.5&&learns.length>=10?"<span class='warn'>⚠ 毎回パターンを発見している状態は過学習のサイン</span>":"健全に運用できていれば大半がノイズ判定になる")+"</div></div>";
  }
  el.innerHTML = html;
  ["fH","fM","fR"].forEach((id,i)=>{
    $("#"+id).addEventListener("change", e=>{
      measureFilter[["horizon","market","regime"][i]] = e.target.value;
      renderMeasure();
    });
  });
  drawBrierChart($("#brierChart"), pts);
  el.querySelectorAll("[data-retire]").forEach(b=>b.addEventListener("click",()=>{
    const key = b.dataset.retire;
    const label = CRITERIA.find(c=>c.key===key).label;
    if(!confirm("基準「"+label+"」を削除確定しますか？（過去データは残ります。今後の予測生成でこの基準を使わない合意になります。復帰可能）")) return;
    state.retiredCriteria[key] = {retiredAt:new Date().toISOString()};
    saveOverrides(); renderMeasure();
  }));
  el.querySelectorAll("[data-revive]").forEach(b=>b.addEventListener("click",()=>{
    delete state.retiredCriteria[b.dataset.revive];
    saveOverrides(); renderMeasure();
  }));
}

  });
  html += "</div>";
  html += "<h2>データ概要</h2><div class='panel mut' style='font-size:13px'>アプリ v"+APP_VERSION+"　／　ラウンド "+state.rounds.length+"件　／　ポジション "+state.positions.length+"件（解決済み "+state.positions.filter(p=>p.resolution).length+"件）　／　schemaVersion "+state.schemaVersion+"　／　最終更新 "+(state.updatedAt||"—")+"</div>";
  el.innerHTML = html;
  el.querySelectorAll("[data-chip]").forEach(ch=>ch.addEventListener("click",()=>{
    const id = ch.dataset.chip;
    const prog = loadJsonKey(CURRICULUM_PROGRESS_KEY);
    const rec = prog[id];
    if(!rec || rec.count<1){ showToast("未読の項目です。答え合わせで表示されると既読になります"); return; }
    rec.understood = !rec.understood;
    prog[id] = rec;
    saveJsonKey(CURRICULUM_PROGRESS_KEY, prog);
    renderSettings();
  }));
  $("#btnExport").addEventListener("click",()=>{
    const blob = new Blob([JSON.stringify({schemaVersion:state.schemaVersion, updatedAt:state.updatedAt, rounds:state.rounds, positions:state.positions},null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ultimate-game-backup-"+todayStr()+".json";
    a.click(); URL.revokeObjectURL(a.href);
  });
}
/* ================= 初期化 ================= */
$("#verLabel").textContent = "v"+APP_VERSION+" / schema v"+SCHEMA_VERSION+"（全自動モード）";
render();
</script>
</body>
</html>
